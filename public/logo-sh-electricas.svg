<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circulo exterior negro -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#000000" stroke-width="2"/>
  <!-- Circulo interior rojo fino -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#cc0000" stroke-width="2.5"/>
  <!-- Fondo interior -->
  <circle cx="100" cy="100" r="79" fill="#1a1a1a"/>
  <!-- Texto S&H grande -->
  <text x="100" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="2">S&amp;H</text>
  <!-- Rayo rojo vertical central -->
  <polygon points="100,30 108,65 102,65 110,90 96,70 103,70 95,30" fill="#cc0000"/>
  <!-- Texto inferior S & H ELECTRICAS -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" letter-spacing="3">S &amp; H</text>
  <text x="100" y="163" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="normal" fill="#cc0000" letter-spacing="4">ELÉCTRICAS</text>
</svg>
